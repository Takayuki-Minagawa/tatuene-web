name: Deploy to GitHub Pages

on:
  # main ブランチへの push で自動デプロイ
  push:
    branches: [main]
  # Actions タブから手動実行も可能にする
  workflow_dispatch:

# GITHUB_TOKEN に Pages へのデプロイ権限を付与
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行を 1 つに制限（進行中の本番デプロイはキャンセルしない）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        # Next.js アプリはサブディレクトリにある
        working-directory: tatuene-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tatuene-web/package-lock.json

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build (static export)
        # configure-pages が解決した base_path を Next.js に渡す
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # next.config.ts の output: "export" は out/ に出力する
          path: tatuene-web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
